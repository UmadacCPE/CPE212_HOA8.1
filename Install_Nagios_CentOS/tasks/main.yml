---
    - name: Install required packages
      yum:
        name:
          - httpd
          - php
          - gcc
          - glibc
          - glibc-common
          - wget
          - unzip
          - make
          - gd
          - gd-devel
          - openssl
          - openssl-devel
          - curl
        state: present
      when: ansible_distribution == "CentOS"

    - name: Create nagios user and group
      user:
        name: nagios
        create_home: yes
        shell: /bin/bash
      when: ansible_distribution == "CentOS"

    - name: Create nagcmd group
      group:
        name: nagcmd
        state: present
      when: ansible_distribution == "CentOS"

    - name: Add nagios and apache to nagcmd group
      user:
        name: "{{ item }}"
        groups: nagcmd
        append: yes
      loop:
        - nagios
        - apache
      when: ansible_distribution == "CentOS"

    - name: Download Nagios Core source
      get_url:
        url: https://assets.nagios.com/downloads/nagioscore/releases/nagios-4.4.14.tar.gz
        dest: /tmp/nagios.tar.gz
      when: ansible_distribution == "CentOS"

    - name: Extract Nagios Core
      unarchive:
        src: /tmp/nagios.tar.gz
        dest: /tmp/
        remote_src: yes
      when: ansible_distribution == "CentOS"

    - name: Compile and install Nagios
      shell: |
        cd /tmp/nagios-4.4.14
        ./configure --with-nagios-group=nagios --with-command-group=nagcmd
        make all
        make install
        make install-init
        make install-commandmode
        make install-config
        make install-webconf
      args:
        creates: /usr/local/nagios/bin/nagios
      when: ansible_distribution == "CentOS"

    - name: Set up Nagios admin user
      shell: htpasswd -b -c /usr/local/nagios/etc/htpasswd.users {{ nagios_admin_user }} {{ nagios_admin_password }}
      args:
        creates: /usr/local/nagios/etc/htpasswd.users
      when: ansible_distribution == "CentOS"

    - name: Enable Apache modules
      shell: |
        echo "LoadModule cgi_module modules/mod_cgi.so" >> /etc/httpd/conf/httpd.conf
      notify: Restart Apache
      when: ansible_distribution == "CentOS"

    - name: Start Nagios service
      service:
        name: nagios
        state: started
        enabled: yes
      when: ansible_distribution == "CentOS"
